name: Release macOS Python App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip -r python_gui/requirements-build.txt

      - name: Build macOS app bundle
        run: zsh python_gui/build_macos.sh

      - name: Create release archive
        run: ditto -c -k --sequesterRsrc --keepParent dist/MyDailyCash.app dist/MyDailyCash-macos.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyDailyCash-macos
          path: dist/MyDailyCash-macos.zip

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MyDailyCash-macos.zip
          generate_release_notes: true
