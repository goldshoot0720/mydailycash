name: Release Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Determine Android build mode
        id: android-build
        working-directory: android_apk
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "build_task=assembleRelease" >> "$GITHUB_OUTPUT"
            echo "apk_path=app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_OUTPUT"
            echo "asset_name=MyDailyCash-android-${GITHUB_REF_NAME}.apk" >> "$GITHUB_OUTPUT"
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release-keystore.jks
          else
            echo "Android signing secrets are missing; falling back to debug APK."
            echo "build_task=assembleDebug" >> "$GITHUB_OUTPUT"
            echo "apk_path=app/build/outputs/apk/debug/app-debug.apk" >> "$GITHUB_OUTPUT"
            echo "asset_name=MyDailyCash-android-${GITHUB_REF_NAME}-debug.apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Android APK
        working-directory: android_apk
        env:
          ANDROID_KEYSTORE_PATH: release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew "${{ steps.android-build.outputs.build_task }}"

      - name: Prepare APK asset
        run: |
          mkdir -p dist
          cp "android_apk/${{ steps.android-build.outputs.apk_path }}" "dist/${{ steps.android-build.outputs.asset_name }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyDailyCash-android-apk
          path: dist/*.apk

      - name: Clean up keystore
        if: always()
        run: rm -f android_apk/release-keystore.jks

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
